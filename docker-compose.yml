# GlobalCodio monitoring stack — Grafana + Prometheus + Loki only.
#
# Local dev:  `docker compose up -d`
#   → also loads docker-compose.override.yml automatically, which wires
#     the local-only api-local scrape (host.docker.internal:3001).
#
# VM deploy:  `docker compose -f docker-compose.yml up -d`
#   → skips the override so no api-local scrape, no extra_hosts.
#   → only dev/uat/prod targets attempted (driven by targets/*.yml).
#
# All UI ports bind to 127.0.0.1 — put a reverse proxy in front for public
# access (Caddy / nginx). Never expose 3000/9090/3100 publicly.

name: globalcodio-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    restart: unless-stopped
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    secrets:
      - dev_metrics_token
      - uat_metrics_token
      - prod_metrics_token
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Per-file mounts (not whole dir) so the local-only target file from the
      # repo never ships to the VM. Override file adds `local.yml` on dev machines.
      - ./prometheus/targets/dev.yml:/etc/prometheus/targets/dev.yml:ro
      - ./prometheus/targets/uat.yml:/etc/prometheus/targets/uat.yml:ro
      - ./prometheus/targets/prod.yml:/etc/prometheus/targets/prod.yml:ro
      - prom-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.2.1
    container_name: monitoring-loki
    restart: unless-stopped
    user: "10001:10001"
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring

  grafana:
    # 12.x required by grafanactl (CLI used in docs/dashboards.md).
    image: grafana/grafana:12.0.2
    container_name: monitoring-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD must be set in .env}
      # Public Grafana URL used in OAuth callbacks. Empty = falls back to localhost.
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3030}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Microsoft OAuth — populated from .env when team SSO is wired.
      GF_AUTH_GENERIC_OAUTH_ENABLED: ${GF_OAUTH_ENABLED:-false}
      GF_AUTH_GENERIC_OAUTH_NAME: Microsoft
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${GF_OAUTH_CLIENT_ID:-}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GF_OAUTH_CLIENT_SECRET:-}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid email profile
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${GF_OAUTH_AUTH_URL:-}
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: ${GF_OAUTH_TOKEN_URL:-}
      GF_AUTH_GENERIC_OAUTH_API_URL: ${GF_OAUTH_API_URL:-}
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "false"
      # Teams webhooks for alerting — one channel per env.
      TEAMS_WEBHOOK_URL_DEV: ${TEAMS_WEBHOOK_URL_DEV:-}
      TEAMS_WEBHOOK_URL_UAT: ${TEAMS_WEBHOOK_URL_UAT:-}
      TEAMS_WEBHOOK_URL_PROD: ${TEAMS_WEBHOOK_URL_PROD:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Host port 3030 to avoid the apps/web Next.js dev server on 3000.
      # Container still listens internally on 3000 (Grafana default).
      - "127.0.0.1:3030:3000"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prom-data:
  loki-data:
  grafana-data:

# Per-env scrape tokens for Prometheus. Each is mounted at /run/secrets/<name>
# inside the prometheus container and referenced by `credentials_file` in
# prometheus.yml. Populated from .env. Empty value = empty file = target stays
# DOWN with auth error (harmless to other targets).
secrets:
  dev_metrics_token:
    environment: DEV_METRICS_TOKEN
  uat_metrics_token:
    environment: UAT_METRICS_TOKEN
  prod_metrics_token:
    environment: PROD_METRICS_TOKEN
