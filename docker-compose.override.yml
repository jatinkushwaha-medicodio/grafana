# Local-only overlay — auto-loaded by `docker compose up` on a developer
# machine. Adds the api-local scrape path (developer's host Node API running on
# host.docker.internal:3001) without touching the base config the VM runs.
#
# VM ops bypass this file with:  `docker compose -f docker-compose.yml up -d`
#
# Keep this file's contents strictly additive — never override anything that
# the VM also needs.

services:
  prometheus:
    secrets:
      - local_metrics_token
    extra_hosts:
      # Lets the Prometheus container reach the developer's host. Native on
      # Mac/Windows; `host-gateway` makes the same name work on Linux too.
      - "host.docker.internal:host-gateway"
    volumes:
      # Mounts the local-only scrape target into the same dir as the per-env
      # files. Compose merges this list with the base — additive, doesn't
      # touch dev/uat/prod mounts.
      - ./prometheus/targets/local.yml:/etc/prometheus/targets/local.yml:ro

secrets:
  local_metrics_token:
    environment: LOCAL_METRICS_TOKEN
