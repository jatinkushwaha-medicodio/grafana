apiVersion: 1

# Route alerts by the `env` Prometheus label (auto-attached because all our
# metrics carry it). Default fallback = teams-dev (local + unlabelled alerts
# also land there so nothing is silently dropped).

policies:
  - orgId: 1
    receiver: teams-dev
    group_by: [grafana_folder, alertname, env]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: teams-dev
        object_matchers:
          - [env, =, dev]
          - [env, =, local]
      - receiver: teams-uat
        object_matchers:
          - [env, =, uat]
      - receiver: teams-prod
        object_matchers:
          - [env, =, prod]
        # Prod pages faster + retries more often than the dev/uat default.
        group_wait: 10s
        repeat_interval: 1h
