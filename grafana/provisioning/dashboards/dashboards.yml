# Grafana dashboard provider — points at the JSON dashboards committed under
# grafana/dashboards/. Updates on disk are picked up every 10s.

apiVersion: 1

providers:
  - name: GlobalCodio
    orgId: 1
    folder: GlobalCodio
    type: file
    disableDeletion: true
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
